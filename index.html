<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraction Simplifier</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1f2e;
    --surface: #242b3d;
    --surface2: #2e3650;
    --chalk-white: #f0ece0;
    --chalk-yellow: #f5d547;
    --chalk-cyan: #4ecdc4;
    --chalk-coral: #ff6b6b;
    --chalk-purple: #c084fc;
    --chalk-green: #6ee7b7;
    --text: #e8e4d8;
    --text-dim: #8892a4;
    --border: #3a4260;
    --glow-yellow: rgba(245,213,71,0.3);
    --glow-cyan: rgba(78,205,196,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 48px;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(78,205,196,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(245,213,71,0.06) 0%, transparent 50%);
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 5vw, 3rem);
    text-align: center;
    color: var(--chalk-yellow);
    letter-spacing: 1px;
    text-shadow: 0 0 30px var(--glow-yellow);
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    color: var(--text-dim);
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 32px;
  }

  .container { max-width: 860px; margin: 0 auto; }

  /* INPUT CARD */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--chalk-cyan), var(--chalk-yellow));
  }

  .card-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    color: var(--chalk-cyan);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* FRACTION INPUT */
  .input-row {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .fraction-input {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .fraction-input input {
    width: 90px;
    height: 64px;
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--chalk-white);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .fraction-input input:focus {
    border-color: var(--chalk-cyan);
    box-shadow: 0 0 0 3px var(--glow-cyan);
  }
  .fraction-line {
    width: 90px;
    height: 3px;
    background: var(--chalk-white);
    border-radius: 2px;
  }
  .frac-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn {
    padding: 14px 28px;
    border-radius: 50px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--chalk-cyan), #38b2ac);
    color: #0d1117;
    box-shadow: 0 4px 20px var(--glow-cyan);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px var(--glow-cyan); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--chalk-yellow);
    border: 2px solid var(--chalk-yellow);
  }
  .btn-secondary:hover { background: rgba(245,213,71,0.1); transform: translateY(-2px); }

  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  /* ERROR */
  .error-msg {
    text-align: center;
    color: var(--chalk-coral);
    font-weight: 700;
    font-size: 0.95rem;
    margin-top: 12px;
    min-height: 22px;
  }

  /* RESULTS SECTION */
  #results { display: none; }

  /* ALREADY SIMPLIFIED BANNER */
  .banner {
    background: linear-gradient(135deg, rgba(110,231,183,0.15), rgba(78,205,196,0.1));
    border: 1.5px solid var(--chalk-green);
    border-radius: 16px;
    padding: 18px 24px;
    text-align: center;
    color: var(--chalk-green);
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    margin-bottom: 24px;
  }

  /* SIMPLIFIED DISPLAY */
  .fraction-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    margin: 20px 0;
    flex-wrap: wrap;
  }
  .frac-block {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .frac-big {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .frac-num {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    line-height: 1;
  }
  .frac-bar {
    width: 80px;
    height: 4px;
    border-radius: 2px;
  }
  .frac-original .frac-num { color: var(--chalk-coral); }
  .frac-original .frac-bar { background: var(--chalk-coral); }
  .frac-simplified .frac-num { color: var(--chalk-green); }
  .frac-simplified .frac-bar { background: var(--chalk-green); }
  .frac-check-text {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-weight: 600;
    margin-top: 6px;
    text-align: center;
    line-height: 1.6;
  }
  .frac-label2 {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 8px;
    color: var(--text-dim);
  }
  .arrow-big {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .arrow-line {
    font-size: 2.2rem;
    color: var(--chalk-yellow);
    animation: pulse 1.5s infinite;
  }
  .gcf-op-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: rgba(245,213,71,0.07);
    border: 1.5px dashed rgba(245,213,71,0.4);
    border-radius: 16px;
    padding: 14px 20px;
    min-width: 160px;
  }
  .gcf-badge {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    background: rgba(245,213,71,0.2);
    color: var(--chalk-yellow);
    padding: 4px 14px;
    border-radius: 50px;
    letter-spacing: 0.5px;
  }
  .gcf-arrows {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
  }
  .gcf-div-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.05rem;
    color: var(--text);
  }
  .gcf-div-sym { color: var(--chalk-cyan); }
  .gcf-eq { color: var(--text-dim); }
  .gcf-result { color: var(--chalk-green); }
  .gcf-div-line {
    height: 1px;
    background: var(--border);
    margin: 3px 0;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* STEPS SECTION */
  .steps-list { display: flex; flex-direction: column; gap: 14px; }
  .step {
    background: var(--surface2);
    border-radius: 14px;
    padding: 16px 20px;
    border-left: 4px solid var(--chalk-purple);
    opacity: 0;
    transform: translateX(-20px);
    animation: slideIn 0.4s forwards;
  }
  @keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
  }
  .step-num {
    font-family: 'Fredoka One', cursive;
    font-size: 0.75rem;
    color: var(--chalk-purple);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .step-content {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.6;
  }
  .step-content .highlight { color: var(--chalk-yellow); font-family: 'Fredoka One', cursive; font-size: 1.1rem; }
  .step-content .op { color: var(--chalk-cyan); }
  .step-content .result { color: var(--chalk-green); font-family: 'Fredoka One', cursive; }

  .division-box {
    background: var(--bg);
    border-radius: 10px;
    padding: 14px 18px;
    margin-top: 12px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .div-fraction {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .div-num {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
  }
  .div-bar { width: 50px; height: 2px; }
  .div-arrow { color: var(--chalk-yellow); font-size: 1.5rem; }
  .div-step-label { font-size: 0.8rem; color: var(--text-dim); font-weight: 700; text-align: center; margin-top: 4px; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .tab {
    padding: 8px 20px;
    border-radius: 50px;
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    cursor: pointer;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--chalk-yellow);
    color: #0d1117;
    border-color: var(--chalk-yellow);
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* VISUAL SECTION */
  .visual-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
  }
  @media(max-width: 620px) { .visual-grid { grid-template-columns: 1fr; } }

  .vis-card {
    background: var(--surface2);
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
  }
  .vis-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.25rem;
    margin-bottom: 20px;
    color: var(--chalk-cyan);
  }
  .vis-label {
    font-size: 0.85rem;
    color: var(--text-dim);
    font-weight: 700;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .vis-pair {
    display: flex;
    justify-content: center;
    gap: 36px;
    align-items: center;
    flex-wrap: wrap;
  }
  .vis-item { text-align: center; }

  /* PIE */
  canvas.pie { border-radius: 50%; display: block; margin: 0 auto; }
  .pie-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    align-items: center;
  }
  .pie-unit { text-align: center; position: relative; }
  .pie-whole-label {
    font-family: 'Fredoka One', cursive;
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 3px;
  }

  /* BAR */
  .bar-wrap { width: 100%; }
  .bars-wrap { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  .bar-row-wrap { display: flex; align-items: center; gap: 10px; }
  .bar-whole-num {
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    color: var(--text-dim);
    min-width: 18px;
    text-align: right;
  }
  .bar-container {
    display: flex;
    flex: 1;
    height: 56px;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid var(--border);
  }
  .bar-segment {
    height: 100%;
    transition: width 0.6s ease;
  }
  .bar-segment.filled { background: var(--chalk-cyan); }
  .bar-segment.empty  { background: var(--surface); }

  /* BADGES */
  .badge {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 50px;
    font-size: 0.75rem;
    font-weight: 800;
    margin-top: 6px;
  }
  .badge-original { background: rgba(255,107,107,0.2); color: var(--chalk-coral); }
  .badge-simplified { background: rgba(110,231,183,0.2); color: var(--chalk-green); }

  /* GCD TREE */
  .gcd-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    font-size: 0.95rem;
  }
  .gcd-row:last-child { border-bottom: none; }
  .gcd-check { color: var(--chalk-green); font-size: 1.1rem; }
  .gcd-cross { color: var(--chalk-coral); font-size: 1.1rem; }

  @media(max-width: 560px) {
    .input-row { gap: 12px; }
    .fraction-input input { width: 72px; height: 54px; font-size: 1.5rem; }
    .fraction-line { width: 72px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>✏️ Fraction Simplifier</h1>
  <p class="subtitle">Enter a fraction and watch it shrink — step by step!</p>

  <!-- INPUT CARD -->
  <div class="card">
    <div class="card-title">📥 Enter Your Fraction</div>
    <div class="input-row">
      <div class="fraction-input">
        <span class="frac-label">Numerator</span>
        <input type="number" id="numerator" placeholder="12" min="1" max="999">
        <div class="fraction-line"></div>
        <input type="number" id="denominator" placeholder="18" min="1" max="999">
        <span class="frac-label">Denominator</span>
      </div>
    </div>
    <div class="error-msg" id="error"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="simplify()">🔍 Simplify It!</button>
      <button class="btn btn-secondary" onclick="randomFraction()">🎲 Random Fraction</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results">

    <!-- ALREADY SIMPLIFIED BANNER (hidden by default) -->
    <div id="already-banner" class="banner" style="display:none;">
      ✅ This fraction is already in its simplest form!
    </div>

    <!-- BEFORE / AFTER -->
    <div class="card">
      <div class="card-title">🎯 Result</div>
      <div class="fraction-display">
        <div class="frac-block frac-original">
          <div class="frac-big">
            <span class="frac-num" id="res-num-orig"></span>
            <div class="frac-bar"></div>
            <span class="frac-num" id="res-den-orig"></span>
          </div>
          <div class="frac-label2" style="margin-top:8px;">Original</div>
        </div>
        <div class="arrow-big" id="arrow-big" style="display:none;">
          <div class="gcf-op-block" id="gcf-op-block">
            <div class="gcf-badge">GCF = <span id="gcf-value"></span></div>
            <div class="gcf-arrows">
              <div class="gcf-div-row">
                <span id="gcf-num-orig-label"></span>
                <span class="gcf-div-sym">÷</span>
                <span id="gcf-val-top"></span>
                <span class="gcf-eq">=</span>
                <span id="gcf-num-simp-label" class="gcf-result"></span>
              </div>
              <div class="gcf-div-line"></div>
              <div class="gcf-div-row">
                <span id="gcf-den-orig-label"></span>
                <span class="gcf-div-sym">÷</span>
                <span id="gcf-val-bot"></span>
                <span class="gcf-eq">=</span>
                <span id="gcf-den-simp-label" class="gcf-result"></span>
              </div>
            </div>
          </div>
        </div>
        <div class="frac-block frac-simplified" id="simplified-block" style="display:none;">
          <div class="frac-big">
            <span class="frac-num" id="res-num-simp"></span>
            <div class="frac-bar"></div>
            <span class="frac-num" id="res-den-simp"></span>
          </div>
          <div class="frac-label2" style="margin-top:8px;">Simplified</div>
          <div class="frac-check-text" id="frac-check-text"></div>
        </div>
      </div>
    </div>

    <!-- TABS: STEPS + VISUALS -->
    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('steps', this)">📐 Step-by-Step</button>
        <button class="tab" onclick="switchTab('visual', this)">🎨 Visual Demo</button>
      </div>

      <!-- STEPS PANEL -->
      <div class="tab-panel active" id="tab-steps">
        <div class="steps-list" id="steps-list"></div>
      </div>

      <!-- VISUAL PANEL -->
      <div class="tab-panel" id="tab-visual">
        <div class="visual-grid">
          <!-- PIE -->
          <div class="vis-card">
            <div class="vis-title">🥧 Circle Model</div>
            <div class="vis-pair">
              <div class="vis-item">
                <div class="vis-label">Original</div>
                <div id="pie-orig-wrap" class="pie-wrap"></div>
                <div id="badge-pie-orig" class="badge badge-original"></div>
              </div>
              <div class="vis-item">
                <div class="vis-label">Simplified</div>
                <div id="pie-simp-wrap" class="pie-wrap"></div>
                <div id="badge-pie-simp" class="badge badge-simplified"></div>
              </div>
            </div>
          </div>

          <!-- BAR -->
          <div class="vis-card">
            <div class="vis-title">📊 Bar Model</div>
            <div style="display:flex;flex-direction:column;gap:28px;">
              <div>
                <div class="vis-label" style="text-align:left">Original</div>
                <div id="bar-orig-wrap" class="bars-wrap"></div>
                <div id="badge-bar-orig" class="badge badge-original" style="display:block;text-align:left;margin-top:8px;width:fit-content;font-size:0.9rem;"></div>
              </div>
              <div>
                <div class="vis-label" style="text-align:left">Simplified</div>
                <div id="bar-simp-wrap" class="bars-wrap"></div>
                <div id="badge-bar-simp" class="badge badge-simplified" style="display:block;text-align:left;margin-top:8px;width:fit-content;font-size:0.9rem;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
//  MATH UTILS
// ─────────────────────────────────────────
function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

// Returns list of common divisors > 1 checked during Euclidean walkthrough
function euclideanSteps(a, b) {
  const steps = [];
  let x = a, y = b;
  while (y !== 0) {
    steps.push({ a: x, b: y, q: Math.floor(x / y), r: x % y });
    let tmp = y; y = x % y; x = tmp;
  }
  return { gcdVal: x, steps };
}

// ─────────────────────────────────────────
//  RANDOM
// ─────────────────────────────────────────
function randomFraction() {
  const denominators = [4,6,8,9,10,12,15,16,18,20,24,30];
  const den = denominators[Math.floor(Math.random() * denominators.length)];
  const factors = [];
  for (let i = 1; i <= den; i++) if (den % i === 0) factors.push(i);
  const factor = factors[Math.floor(Math.random() * (factors.length - 1)) + 1];
  const maxNum = Math.floor(den / factor);
  const numPart = Math.floor(Math.random() * (maxNum - 1)) + 1;
  document.getElementById('numerator').value = numPart * factor;
  document.getElementById('denominator').value = den;
  simplify();
}

// ─────────────────────────────────────────
//  MAIN
// ─────────────────────────────────────────
function simplify() {
  const errEl = document.getElementById('error');
  errEl.textContent = '';

  const num = parseInt(document.getElementById('numerator').value);
  const den = parseInt(document.getElementById('denominator').value);

  if (!num || !den || isNaN(num) || isNaN(den)) { errEl.textContent = '⚠️ Please enter both a numerator and denominator.'; return; }
  if (num <= 0 || den <= 0) { errEl.textContent = '⚠️ Both numbers must be positive!'; return; }
  if (den === 0) { errEl.textContent = '⚠️ Denominator cannot be zero!'; return; }

  const { gcdVal, steps: eucSteps } = euclideanSteps(num, den);
  const simpNum = num / gcdVal;
  const simpDen = den / gcdVal;
  const alreadySimple = gcdVal === 1;

  // Show result section
  document.getElementById('results').style.display = 'block';
  document.getElementById('already-banner').style.display = alreadySimple ? 'block' : 'none';
  document.getElementById('arrow-big').style.display = alreadySimple ? 'none' : 'flex';
  document.getElementById('simplified-block').style.display = alreadySimple ? 'none' : 'flex';

  // Before/after
  document.getElementById('res-num-orig').textContent = num;
  document.getElementById('res-den-orig').textContent = den;
  document.getElementById('res-num-simp').textContent = simpNum;
  document.getElementById('res-den-simp').textContent = simpDen;

  // GCF operation block
  document.getElementById('gcf-value').textContent = gcdVal;
  document.getElementById('gcf-val-top').textContent = gcdVal;
  document.getElementById('gcf-val-bot').textContent = gcdVal;
  document.getElementById('gcf-num-orig-label').textContent = num;
  document.getElementById('gcf-den-orig-label').textContent = den;
  document.getElementById('gcf-num-simp-label').textContent = simpNum;
  document.getElementById('gcf-den-simp-label').textContent = simpDen;
  document.getElementById('frac-check-text').innerHTML =
    `${simpNum} × ${gcdVal} = ${num}<br>${simpDen} × ${gcdVal} = ${den}`;

  // Build steps
  buildSteps(num, den, gcdVal, simpNum, simpDen, eucSteps, alreadySimple);

  // Build visuals
  buildVisuals(num, den, simpNum, simpDen);

  // Scroll to results
  setTimeout(() => document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

// ─────────────────────────────────────────
//  STEPS BUILDER
// ─────────────────────────────────────────
function buildSteps(num, den, gcdVal, simpNum, simpDen, eucSteps, alreadySimple) {
  const list = document.getElementById('steps-list');
  list.innerHTML = '';

  const addStep = (num, title, html, delay) => {
    const s = document.createElement('div');
    s.className = 'step';
    s.style.animationDelay = `${delay}s`;
    s.innerHTML = `<div class="step-num">Step ${num} · ${title}</div><div class="step-content">${html}</div>`;
    list.appendChild(s);
  };

  // Step 1: Identify
  addStep(1, 'Identify the Fraction', `
    We want to simplify <span class="highlight">${num}/${den}</span>. 
    To do this, we need to find the <span class="op">Greatest Common Divisor (GCD)</span> — 
    the biggest number that divides evenly into <em>both</em> the numerator and denominator.
  `, 0.1);

  // Step 2: Euclidean Algorithm
  let eucHtml = `We use the <span class="op">Euclidean Algorithm</span> to find GCD(${num}, ${den}):<br><br>`;
  eucSteps.forEach((s, i) => {
    eucHtml += `<div class="gcd-row">
      <span>${i+1}.</span>
      <span>${s.a} = ${s.b} × ${s.q} + <span class="highlight">${s.r}</span></span>
      ${s.r === 0 ? `<span class="gcd-check">✓ remainder is 0 — we're done!</span>` : `<span class="gcd-cross">→ continue</span>`}
    </div>`;
  });
  eucHtml += `<br>🎯 <strong>GCD = <span class="result">${gcdVal}</span></strong>`;
  addStep(2, 'Find the GCD', eucHtml, 0.3);

  // Step 3: Check divisors
  let checkHtml = `Does <span class="highlight">${gcdVal}</span> divide evenly into both numbers?<br><br>
    <div class="gcd-row"><span class="gcd-check">✓</span> ${num} ÷ ${gcdVal} = <span class="result">${simpNum}</span> (no remainder)</div>
    <div class="gcd-row"><span class="gcd-check">✓</span> ${den} ÷ ${gcdVal} = <span class="result">${simpDen}</span> (no remainder)</div>`;
  addStep(3, 'Verify the GCD', checkHtml, 0.5);

  // Step 4: Divide
  if (!alreadySimple) {
    let divHtml = `Divide <em>both</em> the numerator and denominator by <span class="highlight">${gcdVal}</span>:`;
    divHtml += `<div class="division-box">
      <div class="div-fraction">
        <span class="div-num" style="color:var(--chalk-coral)">${num}</span>
        <div class="div-bar" style="background:var(--chalk-coral)"></div>
        <span class="div-num" style="color:var(--chalk-coral)">${den}</span>
        <div class="div-step-label">Original</div>
      </div>
      <span class="div-arrow">÷ ${gcdVal} →</span>
      <div class="div-fraction">
        <span class="div-num" style="color:var(--chalk-yellow)">${num} ÷ ${gcdVal} = ${simpNum}</span>
        <div class="div-bar" style="background:var(--chalk-yellow)"></div>
        <span class="div-num" style="color:var(--chalk-yellow)">${den} ÷ ${gcdVal} = ${simpDen}</span>
        <div class="div-step-label">After Dividing</div>
      </div>
      <span class="div-arrow">=</span>
      <div class="div-fraction">
        <span class="div-num" style="color:var(--chalk-green)">${simpNum}</span>
        <div class="div-bar" style="background:var(--chalk-green)"></div>
        <span class="div-num" style="color:var(--chalk-green)">${simpDen}</span>
        <div class="div-step-label">Simplified ✓</div>
      </div>
    </div>`;
    addStep(4, 'Divide Both Parts', divHtml, 0.7);

    addStep(5, 'Final Answer', `
      <span class="highlight">${num}/${den}</span> simplified is 
      <span class="result" style="font-size:1.4rem"> ${simpNum}/${simpDen}</span> 🎉<br>
      <small style="color:var(--text-dim)">You can check: ${simpNum} × ${gcdVal} = ${num} &nbsp;|&nbsp; ${simpDen} × ${gcdVal} = ${den}</small>
    `, 0.9);
  } else {
    addStep(4, 'Already Simplified!', `
      The GCD is <span class="highlight">1</span>, which means there is no number greater than 1 
      that divides evenly into both <span class="highlight">${num}</span> and <span class="highlight">${den}</span>.<br><br>
      ✅ <strong>${num}/${den}</strong> is already in its <span class="result">simplest form</span>!
    `, 0.7);
  }
}

// ─────────────────────────────────────────
//  VISUALS
// ─────────────────────────────────────────
function buildVisuals(num, den, simpNum, simpDen) {
  drawPies('pie-orig-wrap', num, den, '#ff6b6b', '#2e3650');
  drawPies('pie-simp-wrap', simpNum, simpDen, '#6ee7b7', '#2e3650');

  document.getElementById('badge-pie-orig').textContent = `${num}/${den}`;
  document.getElementById('badge-pie-simp').textContent = `${simpNum}/${simpDen}`;

  drawBars('bar-orig-wrap', num, den, '#4ecdc4');
  drawBars('bar-simp-wrap', simpNum, simpDen, '#6ee7b7');

  document.getElementById('badge-bar-orig').textContent = `${num}/${den}`;
  document.getElementById('badge-bar-simp').textContent = `${simpNum}/${simpDen}`;
}

// Draw multiple pie circles for improper fractions
function drawPies(wrapId, n, d, fillColor, emptyColor) {
  const wrap = document.getElementById(wrapId);
  wrap.innerHTML = '';

  const wholes = Math.floor(n / d);
  const remainder = n % d;
  const total = wholes + (remainder > 0 ? 1 : 0) || 1;
  const size = total <= 3 ? 130 : total <= 6 ? 90 : 70;

  for (let w = 0; w < wholes; w++) {
    const unit = document.createElement('div');
    unit.className = 'pie-unit';
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    canvas.className = 'pie';
    unit.appendChild(canvas);
    const lbl = document.createElement('div');
    lbl.className = 'pie-whole-label';
    lbl.textContent = `${d}/${d}`;
    unit.appendChild(lbl);
    wrap.appendChild(unit);
    drawSinglePie(canvas, d, d, fillColor, emptyColor);
  }

  if (remainder > 0) {
    const unit = document.createElement('div');
    unit.className = 'pie-unit';
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    canvas.className = 'pie';
    unit.appendChild(canvas);
    const lbl = document.createElement('div');
    lbl.className = 'pie-whole-label';
    lbl.textContent = `${remainder}/${d}`;
    unit.appendChild(lbl);
    wrap.appendChild(unit);
    drawSinglePie(canvas, remainder, d, fillColor, emptyColor);
  }

  if (wholes === 0 && remainder === 0) {
    const unit = document.createElement('div');
    unit.className = 'pie-unit';
    const canvas = document.createElement('canvas');
    canvas.width = 130; canvas.height = 130;
    canvas.className = 'pie';
    unit.appendChild(canvas);
    wrap.appendChild(unit);
    drawSinglePie(canvas, 0, d, fillColor, emptyColor);
  }
}

function drawSinglePie(canvas, n, d, fillColor, emptyColor) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2, r = Math.min(w, h) / 2 - 4;
  ctx.clearRect(0, 0, w, h);
  const sliceAngle = (2 * Math.PI) / d;
  for (let i = 0; i < d; i++) {
    const start = -Math.PI / 2 + i * sliceAngle;
    const end = start + sliceAngle;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = i < n ? fillColor : emptyColor;
    ctx.fill();
    ctx.strokeStyle = '#1a1f2e';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

// Draw multiple bar rows for improper fractions
function drawBars(wrapId, n, d, fillColor) {
  const wrap = document.getElementById(wrapId);
  wrap.innerHTML = '';

  const wholes = Math.floor(n / d);
  const remainder = n % d;

  if (wholes === 0) {
    wrap.appendChild(makeBarRow(n, d, fillColor, null));
  } else {
    for (let w = 0; w < wholes; w++) {
      wrap.appendChild(makeBarRow(d, d, fillColor, w + 1));
    }
    if (remainder > 0) {
      wrap.appendChild(makeBarRow(remainder, d, fillColor, wholes + 1));
    }
  }
}

function makeBarRow(filled, total, fillColor, rowNum) {
  const rowWrap = document.createElement('div');
  rowWrap.className = 'bar-row-wrap';

  if (rowNum !== null) {
    const num = document.createElement('div');
    num.className = 'bar-whole-num';
    num.textContent = rowNum;
    rowWrap.appendChild(num);
  }

  const container = document.createElement('div');
  container.className = 'bar-container';
  for (let i = 0; i < total; i++) {
    const seg = document.createElement('div');
    seg.className = 'bar-segment ' + (i < filled ? 'filled' : 'empty');
    seg.style.width = `${100 / total}%`;
    if (i < filled) seg.style.background = fillColor;
    if (i < total - 1) seg.style.borderRight = '2px solid #1a1f2e';
    container.appendChild(seg);
  }
  rowWrap.appendChild(container);
  return rowWrap;
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}
